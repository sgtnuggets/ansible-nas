---
- name: Start droppedneedle
  block:
    - name: Create droppedneedle Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ droppedneedle_config_directory }}"
        - "{{ droppedneedle_cache_directory }}"

    - name: droppedneedle
      community.docker.docker_container:
        name: "{{ droppedneedle_container_name }}"
        image: "{{ droppedneedle_image }}:{{ droppedneedle_version }}"
        pull: true
        ports:
          - "{{ droppedneedle_port }}:8688"
        volumes: "{{ droppedneedle_volumes }}"
        env:
          PUID: "{{ droppedneedle_puid }}"
          PGID: "{{ droppedneedle_pgid }}"
          PORT: "8688"
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        healthcheck:
          test:
            - CMD
            - curl
            - -f
            - "http://localhost:8688/health"
          interval: 30s
          timeout: 10s
          start_period: 15s
          retries: 3
        labels:
          traefik.enable: "{{ droppedneedle_available_externally | default(false) | string }}"
          traefik.http.routers.droppedneedle.rule: "Host(`{{ droppedneedle_hostname | default('droppedneedle') }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.droppedneedle.tls.certresolver: "letsencrypt"
          traefik.http.routers.droppedneedle.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.droppedneedle.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.droppedneedle.loadbalancer.server.port: "8688"
  when: droppedneedle_enabled is true

- name: Stop droppedneedle
  block:
    - name: Stop droppedneedle
      community.docker.docker_container:
        name: "{{ droppedneedle_container_name }}"
        state: absent
  when: droppedneedle_enabled is false
