---
- name: Start Musicseerr
  block:
    - name: Create Musicseerr Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ musicseerr_config_directory }}"
        - "{{ musicseerr_cache_directory }}"

    - name: Musicseerr Docker Container
      community.docker.docker_container:
        name: "{{ musicseerr_container_name }}"
        image: "{{ musicseerr_image }}:{{ musicseerr_version }}"
        pull: true
        ports:
          - "{{ musicseerr_port }}:8688"
        volumes: "{{ musicseerr_volumes }}"
        env:
          PUID: "{{ musicseerr_puid }}"
          PGID: "{{ musicseerr_pgid }}"
          PORT: "8688"
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        healthcheck:
          test:
            - CMD
            - curl
            - -f
            - "http://localhost:8688/health"
          interval: 30
          timeout: 10
          start_period: 15
          retries: 3
        labels:
          traefik.enable: "{{ musicseerr_available_externally | default(false) | string }}"
          traefik.http.routers.musicseerr.rule: "Host(`{{ musicseerr_hostname | default('musicseerr') }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.musicseerr.tls.certresolver: "letsencrypt"
          traefik.http.routers.musicseerr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.musicseerr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.musicseerr.loadbalancer.server.port: "8688"
  when: musicseerr_enabled is true

- name: Stop Musicseerr
  block:
    - name: Stop Musicseerr
      community.docker.docker_container:
        name: "{{ musicseerr_container_name }}"
        state: absent
  when: musicseerr_enabled is false
