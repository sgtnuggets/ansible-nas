---
# Enable or disable the droppedneedle container
droppedneedle_enabled: false

# Container name
droppedneedle_container_name: droppedneedle

# Image and version
droppedneedle_image: ghcr.io/habirabbu/droppedneedle
droppedneedle_version: latest

# Port
droppedneedle_port: 8688

# Data directories for droppedneedle
droppedneedle_config_directory: "{{ docker_home }}/droppedneedle/config"
droppedneedle_cache_directory: "{{ docker_home }}/droppedneedle/cache"

# Optional: music library for local file playback
# Set to a valid path on your host to enable; must match the root folder Lidarr uses
droppedneedle_music_directory: "{{ music_root }}"

# User and group IDs (run `id` on your host to find these)
droppedneedle_puid: "1000"
droppedneedle_pgid: "1000"

# Memory limit (optional)
# droppedneedle_memory: "256m"

# Volume mounts (config and cache are mandatory; music is optional)
droppedneedle_volumes:
  - "{{ droppedneedle_config_directory }}:/app/config"
  - "{{ droppedneedle_cache_directory }}:/app/cache"
  - "/etc/localtime:/etc/localtime:ro"
  - "{{ droppedneedle_music_directory }}:/music:ro"  # Uncomment and set droppedneedle_music_directory to enable
  - "{{ docker_home }}/containerhosts/hosts:/etc/hosts:ro"
