---
- name: Install Home Assistant Supervised on Ubuntu 26
  hosts: streamweaver
  connection: local
  # become: yes
  vars:
    ha_os_agent_version: "1.6.0"
    ha_supervised_installer_version: "1.5.0"

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required base packages
      apt:
        name:
          - jq
          - curl
          - avahi-daemon
          - apparmor
          - apparmor-utils
          - network-manager
          - dbus
          - socat
          - lsb-release
          - wget
        state: present

    - name: Ensure NetworkManager is enabled
      systemd:
        name: NetworkManager
        enabled: yes
        state: started

    - name: Install Docker CE (official repo)
      block:
        - name: Install Docker dependencies
          apt:
            name:
              - ca-certificates
              - gnupg
            state: present

        - name: Add Docker GPG key
          ansible.builtin.shell: |
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
            chmod a+r /etc/apt/keyrings/docker.gpg

        - name: Add Docker repository
          ansible.builtin.copy:
            dest: /etc/apt/sources.list.d/docker.list
            content: |
              deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable

        - name: Update apt cache after adding Docker repo
          apt:
            update_cache: yes

        - name: Install Docker CE packages
          apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            state: present

    - name: Download OS-Agent
      get_url:
        url: "https://github.com/home-assistant/os-agent/releases/download/{{ ha_os_agent_version }}/os-agent_{{ ha_os_agent_version }}_linux_x86_64.deb"
        dest: "/tmp/os-agent.deb"

    - name: Install OS-Agent
      apt:
        deb: "/tmp/os-agent.deb"

    - name: Download Home Assistant Supervised installer
      get_url:
        url: "https://github.com/home-assistant/supervised-installer/releases/download/{{ ha_supervised_installer_version }}/homeassistant-supervised.deb"
        dest: "/tmp/homeassistant-supervised.deb"

    - name: Install Home Assistant Supervised
      apt:
        deb: "/tmp/homeassistant-supervised.deb"

    - name: Ensure hassio-supervisor service is running
      systemd:
        name: hassio-supervisor
        enabled: yes
        state: started

    - name: Ensure hassio-apparmor service is running
      systemd:
        name: hassio-apparmor
        enabled: yes
        state: started
